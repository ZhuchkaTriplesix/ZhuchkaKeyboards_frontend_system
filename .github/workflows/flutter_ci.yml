name: Flutter CI

on:
  push:
    branches: [dev, master, main]
  pull_request:
    branches: [dev, master, main]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Build web (release)
        run: flutter build web --release
